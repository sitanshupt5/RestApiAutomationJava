<!DOCTYPE html>
<html lang="en">
<head>
    <title>Title</title>
</head>
<body>
    <div id="navigation"></div>
    <div id="Listing"></div>

    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js">
    </script>

    <script type="text/javascript">

        // NOTE: The BUCKET_URL below is automatically replaced by the Bootstrap
        // pipeline with your actual S3 bucket URL. Do not edit it manually.

        var S3BL_IGNORE_PATH = true;
        var BUCKET_URL = 'https://YOUR_S3_BUCKET_NAME.s3.amazonaws.com';

        // Files and folders to hide from the portal listing.
        // 'history' folders are internal - they store Allure trend data, not reports.

        var EXCLUDE_FILE = [
            'index.html',
            's3BucketListing.js',
            'js/',
            /^[^/]+\/history\//    // hides APP/history/ at all app levels
        ];

        // When a build number folder (APP/DATE/BUILD/) is clicked, jump straight
        // to the Allure index.html inside it rather than showing its file listing.

        var DIRECT_ACCESS_ALLURE_URL_ADDITION = 'index.html';

        // Regex that matches the 3-level report path:
        // APP/YYYY-MM-DD/BUILD_NUMBER/

        var REGEX_PATH_FOR_DIRECT_ACCESS_ALLURE = new RegExp(
            '^[a-z0-9_-]+\\/[0-9]{4}-[0-9]{2}-[0-9]{2}\\/[0-9]+\\/$'
        );

        // Sort directories newest-first
        var S3BL_SORT = 'ZA';

    </script>

    <script type="text/javascript" src="./js/s3BucketListing.js">
    </script>

</body>
</html>
